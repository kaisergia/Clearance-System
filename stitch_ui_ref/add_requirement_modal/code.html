<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>UniClear | Add Requirement</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#191c1e",
                        "primary-container": "#d9372a",
                        "tertiary-container": "#727577",
                        "primary-fixed": "#ffdad5",
                        "inverse-primary": "#ffb4a9",
                        "surface-container-low": "#eff4ff",
                        "tertiary": "#595c5e",
                        "background": "#f8f9ff",
                        "inverse-on-surface": "#eaf1ff",
                        "on-primary-fixed-variant": "#930004",
                        "on-tertiary-container": "#fbfdff",
                        "on-error": "#ffffff",
                        "outline-variant": "#e4beb8",
                        "surface": "#f8f9ff",
                        "outline": "#8f706b",
                        "secondary-fixed-dim": "#bcc7de",
                        "primary": "#b51b15",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#e0e3e5",
                        "surface-container": "#e5eeff",
                        "surface-tint": "#b91e17",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#d3e4fe",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#410001",
                        "surface-container-high": "#dce9ff",
                        "secondary-fixed": "#d8e3fb",
                        "primary-fixed-dim": "#ffb4a9",
                        "secondary-container": "#d5e0f8",
                        "surface-variant": "#d3e4fe",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fffbff",
                        "on-background": "#0b1c30",
                        "secondary": "#545f73",
                        "on-secondary-fixed-variant": "#3c475a",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "inverse-surface": "#213145",
                        "surface-dim": "#cbdbf5",
                        "on-surface-variant": "#5b403c",
                        "surface-bright": "#f8f9ff",
                        "on-surface": "#0b1c30",
                        "on-tertiary-fixed-variant": "#444749",
                        "on-secondary-container": "#586377",
                        "on-secondary-fixed": "#111c2d",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base_unit": "4px",
                        "margin_desktop": "32px",
                        "container_max_width": "1440px",
                        "sidebar_width": "280px",
                        "margin_mobile": "16px",
                        "header_height": "72px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "label-md": ["JetBrains Mono"],
                        "body-md": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "body-sm": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "label-sm": ["JetBrains Mono"],
                        "headline-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "label-md": ["13px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "label-sm": ["11px", {"lineHeight": "14px", "letterSpacing": "0.04em", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Hanken Grotesk', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chip-remove:hover { background-color: rgba(181, 27, 21, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e4beb8; border-radius: 10px; }
        .modal-overlay {
            backdrop-filter: blur(4px);
            background-color: rgba(11, 28, 48, 0.4);
        }
    </style>
</head>
<body class="bg-surface text-on-surface overflow-hidden h-screen">
<!-- Background Screen Simulation (Requirement Settings) -->
<div class="fixed inset-0 pointer-events-none grayscale-[0.2] opacity-40">
        {{DATA:SCREEN:SCREEN_16}}
    </div>
<!-- Modal Backdrop Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" id="modal-container">
<!-- Modal Content Container -->
<div class="bg-surface-container-lowest w-full max-w-2xl max-h-[90vh] rounded-xl shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300 border border-outline-variant">
<!-- Modal Header -->
<header class="h-[72px] px-8 flex items-center justify-between border-b border-outline-variant shrink-0">
<h2 class="font-headline-md text-headline-md text-on-surface">Add Requirement</h2>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors text-secondary" onclick="window.location.reload()">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Modal Body (Scrollable) -->
<div class="flex-1 overflow-y-auto px-8 py-6 custom-scrollbar">
<form class="space-y-6">
<!-- Requirement Name -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-secondary block">
                            Requirement Name <span class="text-error">*</span>
</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md outline-none" placeholder="No unreturned books" type="text"/>
</div>
<!-- Description -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-secondary block">Description (Optional)</label>
<textarea class="w-full px-4 py-3 rounded-lg border border-outline-variant focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md outline-none resize-none" placeholder="Add details or instructions for this requirement" rows="3"></textarea>
</div>
<!-- Applies To Section -->
<div class="space-y-4">
<h3 class="font-label-md text-label-md text-primary font-bold uppercase tracking-wider">Applies To</h3>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<!-- Department -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-secondary">Department</label>
<div class="relative group">
<select class="appearance-none w-full h-10 px-3 pr-8 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-sm outline-none focus:border-primary cursor-pointer">
<option disabled="" selected="" value="">All Departments</option>
<option>College of Engineering</option>
<option>Arts and Sciences</option>
<option>Business Administration</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-secondary">expand_more</span>
</div>
</div>
<!-- Program -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-secondary">Program</label>
<div class="relative group">
<select class="appearance-none w-full h-10 px-3 pr-8 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-sm outline-none focus:border-primary cursor-pointer">
<option disabled="" selected="" value="">All Programs</option>
<option>BS Computer Science</option>
<option>BS Civil Engineering</option>
<option>BA Communication</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-secondary">expand_more</span>
</div>
</div>
<!-- Year Level -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-secondary">Year Level</label>
<div class="relative group">
<select class="appearance-none w-full h-10 px-3 pr-8 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-sm outline-none focus:border-primary cursor-pointer">
<option disabled="" selected="" value="">All Year Levels</option>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-secondary">expand_more</span>
</div>
</div>
</div>
<!-- Selected Chips (Visual Example) -->
<div class="flex flex-wrap gap-2 pt-2">
<span class="inline-flex items-center gap-1.5 px-3 py-1 bg-primary-container/10 text-primary border border-primary-container/30 rounded-full font-label-sm text-label-sm">
                                College of Engineering
                                <button class="material-symbols-outlined text-[14px] leading-none chip-remove rounded-full" type="button">close</button>
</span>
<span class="inline-flex items-center gap-1.5 px-3 py-1 bg-primary-container/10 text-primary border border-primary-container/30 rounded-full font-label-sm text-label-sm">
                                4th Year
                                <button class="material-symbols-outlined text-[14px] leading-none chip-remove rounded-full" type="button">close</button>
</span>
</div>
</div>
<!-- Attach Forms/Links -->
<div class="space-y-4 pt-2">
<div class="flex items-center justify-between">
<h3 class="font-label-md text-label-md text-primary font-bold uppercase tracking-wider">Attach Forms/Links</h3>
<button class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-primary text-primary font-label-md text-label-md hover:bg-primary-container/10 transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">add</span>
                                Add Link
                            </button>
</div>
<!-- Links Container -->
<div class="border border-outline-variant rounded-xl bg-surface p-4 space-y-4">
<!-- Example Row -->
<div class="flex flex-col md:flex-row gap-4 items-start">
<div class="flex-1 w-full space-y-1">
<label class="font-label-sm text-label-sm text-secondary">Link Name</label>
<input class="w-full h-10 px-3 rounded-lg border border-outline-variant font-body-sm outline-none focus:ring-1 focus:ring-primary" type="text" value="Evaluation Form"/>
</div>
<div class="flex-[2] w-full space-y-1">
<label class="font-label-sm text-label-sm text-secondary">URL</label>
<input class="w-full h-10 px-3 rounded-lg border border-outline-variant font-body-sm outline-none focus:ring-1 focus:ring-primary text-primary" type="url" value="https://forms.google.com/..."/>
</div>
<button class="mt-7 w-10 h-10 flex items-center justify-center text-secondary hover:text-error hover:bg-error/10 rounded-lg transition-all" type="button">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
</div>
</form>
</div>
<!-- Modal Footer -->
<footer class="h-20 px-8 flex items-center justify-end gap-4 border-t border-outline-variant shrink-0 bg-surface-container-lowest">
<button class="px-6 h-12 rounded-lg border border-outline-variant text-secondary font-headline-md font-semibold hover:bg-surface-container transition-colors" onclick="window.location.reload()">
                    Cancel
                </button>
<button class="px-8 h-12 rounded-lg bg-primary text-on-primary font-headline-md font-semibold shadow-md active:scale-95 transition-all">
                    Save Requirement
                </button>
</footer>
</div>
</div>
<!-- Micro-interactions Script -->
<script>
        // Simple scale and fade in effect for modal elements on load
        document.addEventListener('DOMContentLoaded', () => {
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                select.addEventListener('focus', () => {
                    select.parentElement.classList.add('ring-2', 'ring-primary/20');
                });
                select.addEventListener('blur', () => {
                    select.parentElement.classList.remove('ring-2', 'ring-primary/20');
                });
            });
        });

        // Closing logic simulation
        window.onclick = function(event) {
            const modal = document.getElementById('modal-container');
            if (event.target == modal) {
                // In a real app, this would close the modal
                console.log("Overlay clicked - request close");
            }
        }
    </script>
</body></html>
